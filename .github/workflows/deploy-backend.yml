name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd ~/velscent-ecommerce-Backend
            git pull origin main
            npm ci --omit=dev
            # This ensures it starts if it's not already running
            pm2 restart backend || pm2 start server.js --name backend
            pm2 save
